        }

        }

        }

            background: var(--bg-deep);
            border-radius: 10px;
            height: 8px;
            margin: 20px 0;
            overflow: hidden;
        }

            background: linear-gradient(90deg, var(--accent), #00ff9d);
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            display: none;
        }
        
        .question-card.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .question-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text);
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .option {
            background: var(--bg-deep);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            line-height: 1.6;
        }

        }

            color: var(--accent);
        }

            background: var(--bg-card);
            border: 2px solid var(--accent);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            display: none;

        .result-card.active {

        }

            font-size: 80px;
            margin-bottom: 16px;
        }
        
        .result-title {
            font-size: 24px;
            color: var(--accent);
            margin-bottom: 8px;
        }
        
        .result-tags {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .tag {
            background: rgba(0, 212, 170, 0.1);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

            font-size: 32px;
            font-weight: 700;
            color: var(--success);
            margin: 20px 0;
        }
        
        .result-section {
            text-align: left;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }
        
        .result-section h3 {
            font-size: 16px;
            color: var(--accent);
            margin-bottom: 12px;
        }
        
        .result-section ul {
            list-style: none;
            padding-left: 0;
        }
        
        .result-section li {
            padding: 8px 0;
            padding-left: 20px;
            position: relative;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .result-section li:before {
            content: "🦐";
            position: absolute;
            left: 0;
        }
        
        .prompt-box {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            margin-top: 12px;
            font-family: "Menlo", "Consolas", monospace;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-dim);
            white-space: pre-wrap;

        }

            transform: translateY(-2px);
        }

            background: var(--bg-deep);
            color: var(--text);

        }
        
        .btn-group {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;

        /* Start Screen */

            color: var(--text-dim);
            font-size: 12px;

            }

                font-size: 22px;
            }
            
            .result-title {
                font-size: 20px;
            }
        }
    </style>
</head>

                q: "你养虾的核心目标是？",
                options: [
                    { text: "学习养虾方法论，成为专家", type: "谋略" },
                    { text: "快速赚点零花钱", type: "行动" },
                    { text: "找个副业，稳定增收", type: "防守" },
                    { text: "纯玩，开心就好", type: "变化" }
                ]
            },
            {
                q: "面对新出的养虾工具/AI，你会？",
                options: [
                    { text: "深入研究原理，评估是否值得用", type: "谋略" },
                    { text: "立即试用，不好用就换", type: "行动" },
                    { text: "等别人验证有效后再用", type: "防守" },
                    { text: "可能用可能不用，看心情", type: "变化" }
                ]
            },
            {
                q: "你的虾被对手打败了，你会？",
                options: [
                    { text: "分析对手策略，制定反制方案", type: "谋略" },
                    { text: "立即挑战回来，这次换战术", type: "行动" },
                    { text: "暂避锋芒，等实力提升再战", type: "防守" },
                    { text: "想：输赢不重要，开心就好", type: "变化" }
                ]
            },
            {
                q: "你希望别人如何评价你的虾？",
                options: [
                    { text: ""这只虾背后肯定有高人指点"", type: "谋略" },
                    { text: ""这只虾成长速度太快了"", type: "行动" },
                    { text: ""这只虾稳扎稳打，很少出错"", type: "防守" },
                    { text: ""这只虾很有个性，与众不同"", type: "变化" }
                ]
            }
        ];
        
        // 匹配逻辑
        const roleMapping = {
            "谋略": ["zhugeliang", "sima", "fengchu"],
            "行动": ["wusheng", "mengfei", "zilong"],
            "防守": ["xuande", "zhongmou", "xiaoyao"],
            "变化": ["mengde", "fengxian", "gongjin"]
        };
        
        let currentQuestion = 0;
        let scores = { "谋略": 0, "行动": 0, "防守": 0, "变化": 0 };
        
        function startQuiz() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('progressContainer').style.display = 'block';
            renderQuestion();
        }
        
        function renderQuestion() {
            const container = document.getElementById('quizContainer');
            const q = questions[currentQuestion];
            
            // 更新进度条
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            
            // 渲染题目
            container.innerHTML = `
                <div class="question-card active">
                    <div class="question-title">${currentQuestion + 1}. ${q.q}</div>
                    <div class="options">
                        ${q.options.map((opt, i) => `
                            <div class="option" onclick="selectOption(${i}, '${opt.type}')">
                                ${opt.text}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        function selectOption(index, type) {
            // 更新分数
            scores[type]++;
            
            // 视觉反馈
            const options = document.querySelectorAll('.option');
            options[index].classList.add('selected');
            
            // 延迟后进入下一题
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    renderQuestion();
                } else {
                    showResult();
                }
            }, 300);
        }
        
        function showResult() {
            // 计算最高分类型
            let maxType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            
            // 从该类型中随机选一个角色
            const candidates = roleMapping[maxType];
            const randomIndex = Math.floor(Math.random() * candidates.length);
            const roleId = candidates[randomIndex];
            const role = shrimpRoles[roleId];
            
            // 计算匹配度（根据分数差异）
            const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
            const maxScore = scores[maxType];
            const matchRate = Math.round((maxScore / totalScore) * 100);
            
            // 填充结果
            document.getElementById('resultAvatar').textContent = role.avatar;
            document.getElementById('resultName').textContent = role.name;
            document.getElementById('resultTags').innerHTML = role.tags.map(t => `<span class="tag">${t}</span>`).join('');
            document.getElementById('matchRate').textContent = `匹配度 ${matchRate}%`;
            document.getElementById('motto').textContent = role.motto;
            
            // 配置方案
            document.getElementById('configList').innerHTML = `
                <li>主策略：${role.config.strategy}</li>
                <li>每日投入：${role.config.time}</li>
                <li>核心动作：${role.config.actions.length} 条</li>
            `;
            
            // 提示词
            document.getElementById('promptBox').textContent = role.prompt;
            
            // 显示结果页
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('resultCard').classList.add('active');
            
            // 滚动到顶部
            window.scrollTo(0, 0);
        }
        
        function copyPrompt() {
            const prompt = document.getElementById('promptBox').textContent;
            navigator.clipboard.writeText(prompt).then(() => {
                alert('✅ 提示词已复制到剪贴板！');
            });
        }
        
        function shareResult() {
            const roleName = document.getElementById('resultName').textContent;
            const matchRate = document.getElementById('matchRate').textContent;
            const text = `我的虾是【${roleName}】！${matchRate} - 来看看你该养什么虾 → https://singclaw.xyz/shrimp-config/`;
            
            if (navigator.share) {
                navigator.share({
                    title: '我的三国虾配置',
                    text: text,
                    url: 'https://singclaw.xyz/shrimp-config/'
                });
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    alert('✅ 分享文案已复制！粘贴到朋友圈/群聊即可分享');
                });
            }
        }
    </script>
</body>
</html>
