<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测测你的三国虾配置 🦐</title>
    <meta name="description" content="3 分钟答题，获得你的专属三国虾配置 + AI 提示词">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #1a2332 100%);
            min-height: 100vh;
            color: #e6edf3;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; padding: 40px 20px; }
        .header h1 { font-size: 28px; color: #00ff9d; margin-bottom: 10px; }
        .header p { color: #8b949e; font-size: 14px; }
        .card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .question { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #e6edf3; }
        .option {
            background: #161b22;
            border: 2px solid #30363d;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            font-size: 14px;
            line-height: 1.6;
        }
        .option:active { border-color: #00ff9d; background: rgba(0, 255, 157, 0.1); }
        .option.selected { border-color: #00ff9d; background: rgba(0, 255, 157, 0.1); color: #00ff9d; }
        .btn {
            background: #00ff9d;
            color: #000;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .hidden { display: none; }
        .progress { background: #161b22; border-radius: 10px; height: 8px; margin: 20px 0; }
        .progress-bar { background: #00ff9d; height: 100%; border-radius: 10px; width: 0%; }
        .result { text-align: center; border: 2px solid #00ff9d; }
        .avatar { font-size: 80px; margin-bottom: 16px; }
        .result-title { font-size: 24px; color: #00ff9d; margin-bottom: 8px; }
        .tag { display: inline-block; background: rgba(0, 255, 157, 0.1); color: #00ff9d; padding: 6px 12px; border-radius: 20px; font-size: 12px; margin: 4px; }
        .match { font-size: 32px; font-weight: 700; color: #00ff9d; margin: 20px 0; }
        .section { text-align: left; margin-top: 24px; padding-top: 24px; border-top: 1px solid #30363d; }
        .section h3 { font-size: 16px; color: #00ff9d; margin-bottom: 12px; }
        .section li { padding: 8px 0; padding-left: 20px; position: relative; list-style: none; }
        .section li:before { content: "🦐"; position: absolute; left: 0; }
        .prompt-box { background: #0d1117; border: 1px solid #30363d; border-radius: 10px; padding: 16px; margin-top: 12px; font-family: monospace; font-size: 13px; white-space: pre-wrap; }
        .footer { text-align: center; padding: 40px 20px; color: #8b949e; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦐 测测你的三国虾配置</h1>
            <p>3 分钟答题 · 获得专属配置 + AI 提示词</p>
        </div>
        
        <div id="start">
            <div class="card">
                <h2 style="color: #00ff9d; margin-bottom: 16px;">找到最适合你的养虾策略</h2>
                <p style="color: #8b949e; line-height: 1.8; margin-bottom: 24px;">
                    不是测试"你是什么人"<br>
                    而是推荐"你该养什么虾"
                </p>
                <button class="btn" onclick="startTest()">开始测试</button>
            </div>
        </div>
        
        <div id="quiz" class="hidden"></div>
        
        <div id="result" class="card result hidden">
            <div class="avatar" id="r-avatar">🦐</div>
            <h2 class="result-title" id="r-name">诸葛虾</h2>
            <div id="r-tags"></div>
            <div class="match" id="r-match">匹配度 92%</div>
            <div class="section">
                <h3>📋 你的配置方案</h3>
                <ul id="r-config"></ul>
            </div>
            <div class="section">
                <h3>💡 专属 AI 提示词</h3>
                <div class="prompt-box" id="r-prompt"></div>
            </div>
            <div class="section">
                <h3>🎯 虾生格言</h3>
                <p id="r-motto" style="font-style: italic; color: #00ff9d;"></p>
            </div>
            <button class="btn" onclick="copyPrompt()">📋 复制提示词</button>
            <button class="btn" style="background: #161b22; color: #e6edf3;" onclick="location.reload()">🔄 重新测试</button>
        </div>
        
        <div class="footer">
            <p>Powered by SingClaw</p>
        </div>
    </div>
    
    <script>
        var roles = {
            zhugeliang: { name: "诸葛虾", avatar: "🦐🎋", tags: ["零成本启动", "借势布局"], motto: "善战者不战", config: { strategy: "信息差套利", time: "1 小时/天", actions: ["用 AI 分析市场数据", "找被低估的虾种", "低价收→养大→高价卖"] }, prompt: "你是诸葛虾，核心是\"借\"——借信息差、借趋势、借工具。\n\n今天用 AI 分析过去 7 天价格数据，找出 3 个被低估的虾种。", color: "#00D4AA" },
            sima: { name: "司马虾", avatar: "🦐🐢", tags: ["隐忍待机", "一击必杀"], motto: "能忍人所不能忍", config: { strategy: "蛰伏→出击", time: "30 分钟/天", actions: ["设定出击信号", "信号出现前只观察", "信号出现重仓出击"] }, prompt: "你是司马虾，核心是\"忍\"——90% 时间观察，10% 时间重拳。", color: "#4A5568" },
            fengchu: { name: "凤雏虾", avatar: "🦐🔗", tags: ["连环计", "多线协同"], motto: "计中计局中局", config: { strategy: "多虾种组合", time: "2 小时/天", actions: ["选 3 个相关性低的虾种", "设计对冲策略", "每周再平衡"] }, prompt: "你是凤雏虾，核心是\"连环\"——让每个动作都服务于多个目标。", color: "#FF6B35" },
            wusheng: { name: "武圣虾", avatar: "🦐🐉", tags: ["单点突破", "一招鲜"], motto: "一招鲜吃遍天", config: { strategy: "All in 一个虾种", time: "1 小时/天", actions: ["选 1 个你最懂的虾种", "把所有资源投入", "练到极致"] }, prompt: "你是武圣虾，核心是\"专\"——把一招练到极致。", color: "#10B981" },
            mengfei: { name: "猛飞虾", avatar: "🦐⚡", tags: ["速战速决", "快进快出"], motto: "该出手时就出手", config: { strategy: "短线交易", time: "30 分钟/天", actions: ["找波动大的虾种", "低买高卖", "严格止损"] }, prompt: "你是猛飞虾，核心是\"快\"——不恋战，见好就收。", color: "#7C3AED" },
            zilong: { name: "子龙虾", avatar: "🦐🛡️", tags: ["七进七出", "持续作战"], motto: "小胜积大胜", config: { strategy: "稳定刷收益", time: "2 小时/天", actions: ["找稳定收益任务", "机械化执行", "累积小胜为大胜"] }, prompt: "你是子龙虾，核心是\"稳\"——每天稳定产出。", color: "#E5E7EB" },
            xuande: { name: "玄德虾", avatar: "🦐💚", tags: ["仁德服人", "积累人脉"], motto: "得人心者得天下", config: { strategy: "虾友圈互助", time: "2 小时/天", actions: ["加入 3 个养虾社群", "主动分享经验", "互换资源"] }, prompt: "你是玄德虾，核心是\"德\"——用分享换信任。", color: "#059669" },
            mengde: { name: "孟德虾", avatar: "🦐👑", tags: ["快速扩张", "规模效应"], motto: "宁教我负天下虾", config: { strategy: "规模效应", time: "4 小时+/天", actions: ["同时养 10+ 只虾", "标准化流程", "用规模压低成本"] }, prompt: "你是孟德虾，核心是\"大\"——用规模换成本优势。", color: "#7C3AED" },
            zhongmou: { name: "仲谋虾", avatar: "🦐⚖️", tags: ["多元配置", "风险分散"], motto: "制衡者久", config: { strategy: "多元配置", time: "1 小时/天", actions: ["虾种分散", "策略分散", "平台分散"] }, prompt: "你是仲谋虾，核心是\"衡\"——不让任何一方独大。", color: "#6366F1" },
            fengxian: { name: "奉先虾", avatar: "🦐💥", tags: ["All in 新虾种", "早期红利"], motto: "有勇有谋者王", config: { strategy: "早期红利", time: "2 小时/天", actions: ["找刚上线的新虾种", "重仓投入", "早期退出"] }, prompt: "你是奉先虾，核心是\"险\"——早期红利窗口只有 7 天。", color: "#EC4899" },
            gongjin: { name: "公瑾虾", avatar: "🦐🔥", tags: ["借势营销", "流量变现"], motto: "东风已至", config: { strategy: "借势营销", time: "1 小时/天", actions: ["找热门话题", "绑定话题", "借流量获客"] }, prompt: "你是公瑾虾，核心是\"借\"——借别人的火，烧自己的船。", color: "#F59E0B" },
            xiaoyao: { name: "逍遥虾", avatar: "🦐🌸", tags: ["佛系养虾", "随缘"], motto: "无为而无不为", config: { strategy: "无为而治", time: "15 分钟/天", actions: ["设置自动喂养", "每周看一次", "不追求最大化"] }, prompt: "你是逍遥虾，核心是\"放\"——让虾自己长。", color: "#F472B6" }
        };
        
        var questions = [
            { q: "遇到养虾难题时，你第一反应是？", options: [{ text: "查资料、找案例、分析根因", type: "谋略" }, { text: "立即尝试解决方案", type: "行动" }, { text: "先稳住局面", type: "防守" }, { text: "换个角度想", type: "变化" }] },
            { q: "你的虾进化失败，你会？", options: [{ text: "复盘整个流程", type: "谋略" }, { text: "立即重新开始", type: "行动" }, { text: "暂停进化", type: "防守" }, { text: "想不适合这路线", type: "变化" }] },
            { q: "看到别人虾养得比你好，你会？", options: [{ text: "研究他的策略", type: "谋略" }, { text: "直接模仿做法", type: "行动" }, { text: "想不一定适合我", type: "防守" }, { text: "养虾是为了开心", type: "变化" }] },
            { q: "你每天能投入多少时间？", options: [{ text: "30 分钟以内", type: "谋略" }, { text: "1-2 小时", type: "行动" }, { text: "2-4 小时", type: "防守" }, { text: "4 小时以上", type: "变化" }] },
            { q: "你养虾的核心目标是？", options: [{ text: "学习成为专家", type: "谋略" }, { text: "快速赚零花钱", type: "行动" }, { text: "找个副业增收", type: "防守" }, { text: "纯玩开心就好", type: "变化" }] },
            { q: "面对新出的养虾工具，你会？", options: [{ text: "深入研究原理", type: "谋略" }, { text: "立即试用", type: "行动" }, { text: "等别人验证", type: "防守" }, { text: "看心情", type: "变化" }] },
            { q: "你的虾被对手打败了，你会？", options: [{ text: "分析制定反制", type: "谋略" }, { text: "立即挑战回来", type: "行动" }, { text: "暂避锋芒", type: "防守" }, { text: "输赢不重要", type: "变化" }] },
            { q: "你希望别人如何评价？", options: [{ text: "有高人指点", type: "谋略" }, { text: "成长速度快", type: "行动" }, { text: "稳扎稳打", type: "防守" }, { text: "很有个性", type: "变化" }] }
        ];
        
        var mapping = { "谋略": ["zhugeliang", "sima", "fengchu"], "行动": ["wusheng", "mengfei", "zilong"], "防守": ["xuande", "zhongmou", "xiaoyao"], "变化": ["mengde", "fengxian", "gongjin"] };
        
        var currentQ = 0;
        var scores = { "谋略": 0, "行动": 0, "防守": 0, "变化": 0 };
        
        function startTest() {
            document.getElementById("start").className = "hidden";
            document.getElementById("quiz").className = "";
            renderQ();
        }
        
        function renderQ() {
            var q = questions[currentQ];
            var html = '<div class="card">';
            html += '<div class="progress"><div class="progress-bar" id="pb"></div></div>';
            html += '<div class="question">' + (currentQ + 1) + '. ' + q.q + '</div>';
            for (var i = 0; i < q.options.length; i++) {
                html += '<div class="option" onclick="select(' + i + ', \'' + q.options[i].type + '\')">' + q.options[i].text + '</div>';
            }
            html += '</div>';
            document.getElementById("quiz").innerHTML = html;
            document.getElementById("pb").style.width = ((currentQ + 1) / questions.length * 100) + '%';
        }
        
        function select(idx, type) {
            scores[type]++;
            var opts = document.querySelectorAll(".option");
            opts[idx].className += " selected";
            setTimeout(function() {
                currentQ++;
                if (currentQ < questions.length) {
                    renderQ();
                } else {
                    showResult();
                }
            }, 200);
        }
        
        function showResult() {
            var maxType = "谋略";
            for (var k in scores) {
                if (scores[k] > scores[maxType]) maxType = k;
            }
            var cands = mapping[maxType];
            var rand = Math.floor(Math.random() * cands.length);
            var role = roles[cands[rand]];
            var total = 0;
            for (var k in scores) total += scores[k];
            var match = Math.round((scores[maxType] / total) * 100);
            
            document.getElementById("r-avatar").innerHTML = role.avatar;
            document.getElementById("r-name").innerHTML = role.name;
            document.getElementById("r-tags").innerHTML = role.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('');
            document.getElementById("r-match").innerHTML = "匹配度 " + match + "%";
            document.getElementById("r-motto").innerHTML = role.motto;
            document.getElementById("r-config").innerHTML = '<li>主策略：' + role.config.strategy + '</li><li>每日投入：' + role.config.time + '</li><li>核心动作：' + role.config.actions.length + '条</li>';
            document.getElementById("r-prompt").innerHTML = role.prompt;
            
            document.getElementById("quiz").className = "hidden";
            document.getElementById("result").className = "card result";
        }
        
        function copyPrompt() {
            var text = document.getElementById("r-prompt").innerHTML;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(function() {
                    alert("✅ 已复制！");
                });
            } else {
                alert("提示词：" + text);
            }
        }
    </script>
</body>
</html>
