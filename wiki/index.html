<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SingClaw Docs · NPDP产品团队知识库</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #4f46e5;
      --sidebar-name-font-size: 1.1rem;
      --sidebar-nav-link-font-size: 0.9rem;
      --content-max-width: 900px;
    }
    .markdown-section { padding: 2rem 1rem; }
    .markdown-section table { font-size: 0.85rem; }
    .markdown-section table th, .markdown-section table td { padding: 6px 12px; }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: '🦞 SingClaw Docs',
      repo: 'https://github.com/Parsons791400458/singclaw-site',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      basePath: '/docs/'
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@latest/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@latest/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@latest/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
