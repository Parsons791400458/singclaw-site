const catNames = {trade:"📈 交易",content:"✍️ 内容",data:"📊 数据",social:"💬 社交",tool:"🔧 工具",agent:"🤖 Agent",office:"📄 办公",search:"🔍 搜索"};
let currentCat = "all";

function render() {
  const q = document.getElementById("searchBox").value.toLowerCase();
  const grid = document.getElementById("grid");
  const filtered = skills.filter(s => {
    if (currentCat !== "all" && s.cat !== currentCat) return false;
    if (q && !s.n.toLowerCase().includes(q) && !s.d.toLowerCase().includes(q)) return false;
    return true;
  });
  
  grid.innerHTML = filtered.map(s => `
    <div class="card" data-cat="${s.cat}">
      <div class="card-head">
        <div class="card-icon cat-${s.cat}">${s.icon}</div>
        <div class="card-name">${s.n}</div>
      </div>
      <div class="card-tags">
        <span class="tag tag-cat">${catNames[s.cat]||s.cat}</span>
      </div>
      <div class="card-desc">${s.d}</div>
    </div>
  `).join("");
  
  document.getElementById("empty").style.display = filtered.length ? "none" : "block";
}

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentCat = btn.dataset.cat;
    render();
  });
});
document.getElementById("searchBox").addEventListener("input", render);
render();
