<!-- Shrimp Stage 4: 虾王 (King) - Legendary, crown, glow aura -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="king-body" x1="10" y1="20" x2="110" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbbf24"/>
      <stop offset=".3" stop-color="#00ff88"/>
      <stop offset=".7" stop-color="#00d4aa"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="king-crown" x1="70" y1="0" x2="95" y2="25" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="king-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="crown-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Aura ring -->
  <circle cx="60" cy="60" r="56" stroke="url(#king-body)" stroke-width="1" opacity=".2">
    <animate attributeName="r" values="54;58;54" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".2;.08;.2" dur="3s" repeatCount="indefinite"/>
  </circle>

  <g filter="url(#king-glow)">
    <!-- Body -->
    <path d="M78 24c22 5 30 24 24 44s-22 34-42 36c-15 3-28-6-30-20s6-26 18-36c13-11 22-20 30-24z" fill="url(#king-body)" stroke="#fbbf24" stroke-width="1.5"/>
    <!-- Segment lines -->
    <path d="M72 50c-14 5-24 14-28 24M68 44c-16 6-26 16-30 28M64 56c-12 4-20 12-24 20" stroke="#009080" stroke-width=".8" opacity=".3"/>
    <!-- Rostrum -->
    <path d="M88 28c10-6 18-4 24-1" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <!-- Eye -->
    <circle cx="86" cy="34" r="8" fill="#020408"/>
    <circle cx="88" cy="32" r="3.5" fill="#fff"/>
    <circle cx="89" cy="31" r="1.5" fill="#fbbf24" opacity=".7"/>
    <!-- Antenna -->
    <path d="M90 26c10-16 22-20 30-16M88 24c6-16 16-22 24-20" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Walking legs -->
    <path d="M60 78c-6 7-5 12 0 12M54 72c-7 6-7 12-2 13M48 66c-8 5-9 10-5 13M44 60c-9 4-10 9-6 12M42 54c-9 3-10 8-6 10" stroke="#00b89a" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Chelipeds -->
    <path d="M82 44c10 2 12 9 7 12s-10 0-12-5" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Tail fan -->
    <path d="M28 96c-14 8-20 4-16-6M28 96c-10 14-18 14-16 6M28 96c-5 16-12 18-14 13M28 96c-1 14-6 19-10 16M28 96c2 12-3 18-6 16" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Crown -->
  <g filter="url(#crown-glow)">
    <path d="M72 18l4-14 5 8 6-10 5 10 5-6 3 14z" fill="url(#king-crown)" stroke="#f59e0b" stroke-width="1"/>
    <circle cx="82" cy="6" r="2" fill="#fff" opacity=".8"/>
    <circle cx="88" cy="10" r="1.5" fill="#fff" opacity=".6"/>
  </g>

  <!-- Sparkles -->
  <circle cx="100" cy="20" r="2" fill="#fbbf24" opacity=".7">
    <animate attributeName="opacity" values=".7;.1;.7" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="80" r="1.5" fill="#a855f7" opacity=".5">
    <animate attributeName="opacity" values=".5;.1;.5" dur="2s" repeatCount="indefinite" begin=".5s"/>
  </circle>
  <circle cx="50" cy="15" r="1.5" fill="#00ff88" opacity=".6">
    <animate attributeName="opacity" values=".6;.1;.6" dur="1.8s" repeatCount="indefinite" begin="1s"/>
  </circle>
</svg>