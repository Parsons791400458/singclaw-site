<!-- Shrimp Stage 2: 幼虾 (Juvenile) - Bigger, some color -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="juv-body" x1="20" y1="30" x2="100" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00d4aa"/>
      <stop offset="1" stop-color="#0090a0"/>
    </linearGradient>
    <filter id="juv-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#juv-glow)">
    <!-- Body segments -->
    <path d="M75 28c18 4 25 20 20 38s-18 28-35 30c-12 2-22-5-24-16s4-22 14-30c10-9 18-18 25-22z" fill="url(#juv-body)" stroke="#00d4aa" stroke-width="1.5"/>
    <!-- Segment lines -->
    <path d="M70 50c-12 4-20 12-24 20M66 44c-14 5-22 15-26 24" stroke="#00a088" stroke-width=".8" opacity=".5"/>
    <!-- Rostrum -->
    <path d="M84 30c6-3 12-2 16 1" stroke="#00d4aa" stroke-width="2" stroke-linecap="round"/>
    <!-- Eye -->
    <circle cx="82" cy="36" r="7" fill="#020408"/>
    <circle cx="84" cy="34" r="3" fill="#fff"/>
    <!-- Antenna -->
    <path d="M86 28c6-10 15-13 20-10M84 26c4-10 10-15 16-14" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Walking legs -->
    <path d="M58 72c-5 6-4 10 0 10M52 66c-6 5-6 10-2 11M48 60c-7 4-8 9-4 11M45 54c-8 3-9 8-5 10" stroke="#00b89a" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Swimmerets -->
    <path d="M60 78c-3 4-2 7 1 7M55 75c-4 4-3 7 0 7" stroke="#00b89a" stroke-width="1" stroke-linecap="round" opacity=".6"/>
    <!-- Tail fan -->
    <path d="M35 92c-10 6-15 3-12-4M35 92c-6 10-12 10-12 5M35 92c-3 11-8 14-10 10M35 92c0 10-4 15-7 13" stroke="#00d4aa" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>